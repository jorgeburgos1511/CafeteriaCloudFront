name: CI/CD Deploy Frontend to AWS EC2 via ECR

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_FRONT_REPOSITORY }}
  IMAGE_TAG: latest

jobs:
  deploy:
    name: Build, Push Frontend to ECR and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG .

      - name: Push image to Amazon ECR
        run: |
          docker push $ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            AWS_REGION=${{ secrets.AWS_REGION }}
            ECR_REPOSITORY=${{ secrets.ECR_FRONT_REPOSITORY }}
            IMAGE_TAG=latest

            echo "Logging into ECR..."
            aws ecr get-login-password --region $AWS_REGION | \
              sudo docker login --username AWS --password-stdin $(echo $ECR_REPOSITORY | cut -d'/' -f1)

            echo "Pulling latest frontend image..."
            sudo docker pull $ECR_REPOSITORY:$IMAGE_TAG

            echo "Stopping existing frontend container..."
            sudo docker stop cafeteriacloud-front || true
            sudo docker rm cafeteriacloud-front || true

            echo "Starting new frontend container..."
            sudo docker run -d \
              --name cafeteriacloud-front \
              --restart always \
              -p 3000:3000 \
              $ECR_REPOSITORY:$IMAGE_TAG

            echo "Cleaning old images..."
            sudo docker image prune -af

            echo "Frontend deployment completed successfully."